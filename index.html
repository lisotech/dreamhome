<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drea mHome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        /* Main Hero Slider custom heights */
        .mainSwiper { width: 100%; height: 384px; }

        /* Card Sliders custom heights */
        .card-swiper { width: 100%; height: 240px; }

        /* ─── MAKE THE < AND > ARROWS SMALLER ─── */
        /* Targets both the main hero slider and small card sliders */
        .swiper-button-next::after, 
        .swiper-button-prev::after {
            font-size: 18px !important; /* Shrunk from 44px to 18px */
            font-weight: bold;
        }

        /* Adjust button background container to fit smaller arrows cleanly */
        .swiper-button-next, 
        .swiper-button-prev {
            background-color: rgba(0, 0, 0, 0.4);
            width: 32px !important;
            height: 32px !important;
            border-radius: 50%;
            color: white !important;
        }

        .swiper-button-next:hover, 
        .swiper-button-prev:hover {
            background-color: rgba(0, 0, 0, 0.7);
        }

        .swiper-pagination-bullet-active { background: white !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white shadow-md p-2 sticky top-0 z-50">
    <div class="container mx-auto flex justify-between items-center px-4">
        <h1 class="text-lg font-bold text-blue-600 tracking-tight">Dream Home</h1>
        
        <div class="space-x-4 text-sm">
            <a href="#rent" class="hover:text-blue-600 font-medium transition-colors">For Rent</a>
            <a href="#sale" class="hover:text-blue-600 font-medium transition-colors">For Sale</a>
        </div>
    </div>
</nav>

    <section class="container mx-auto my-8 px-4">
        <h2 class="text-3xl font-bold mb-6">Featured Showcase</h2>
        <div class="swiper mainSwiper rounded-xl shadow-lg overflow-hidden">
            <div class="swiper-wrapper">
                <div class="swiper-slide relative bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1200')">
                    <div class="absolute inset-0 bg-black bg-opacity-40 flex flex-col justify-end p-8 text-white">
                        <span class="bg-green-500 w-max px-3 py-1 rounded text-sm font-semibold mb-2">FOR SALE</span>
                        <h3 class="text-2xl font-bold">Luxury Modern Villa</h3>
                        <p class="text-xl">K25,000,000</p>
                    </div>
                </div>
                <div class="swiper-slide relative bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1200')">
                    <div class="absolute inset-0 bg-black bg-opacity-40 flex flex-col justify-end p-8 text-white">
                        <span class="bg-blue-500 w-max px-3 py-1 rounded text-sm font-semibold mb-2">FOR RENT</span>
                        <h3 class="text-2xl font-bold">Urban Minimalist Apartment</h3>
                        <p class="text-xl">K15,000 / mo</p>
                    </div>
                </div>
            </div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
    </section>

    <main class="container mx-auto px-4 space-y-16 my-12">
        
        <section id="rent">
            <h2 class="text-3xl font-bold border-b-2 border-blue-500 pb-2 mb-6">Properties For Rent</h2>
            <div id="rent-container" class="grid md:grid-cols-3 gap-6"></div>
        </section>

        <section id="sale">
            <h2 class="text-3xl font-bold border-b-2 border-green-500 pb-2 mb-6">Properties For Sale</h2>
            <div id="sale-container" class="grid md:grid-cols-3 gap-6"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Initialize Top Hero Slider
        new Swiper(".mainSwiper", {
            navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
            loop: true,
            autoplay: { delay: 5000 }
        });

        // PROPERTY LIST DATA (4 Pictures per Property)
        const rentProperties = [
            {
                id: "house_rent_101",
                title: "Cozy Suburban House",
                price: "K1,800 / mo",
                images: [
                    "https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=500",
                    "https://images.unsplash.com/photo-1556911220-e15b29be8c8f?w=500",
                    "https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=500",
                    "https://images.unsplash.com/photo-1616594039964-ae9021a400a0?w=500"
                ]
            },
            {
                id: "house_rent_102",
                title: "Modern Executive Apartment",
                price: "K4,500 / mo",
                images: [
                    "https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?w=500",
                    "https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=500",
                    "https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=500",
                    "https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?w=500"
                ]
            },
            {
                id: "house_rent_103",
                title: "Charming Lakefront Cottage",
                price: "K3,200 / mo",
                images: [
                    "https://images.unsplash.com/photo-1510798831971-661eb04b3739?w=500",
                    "https://images.unsplash.com/photo-1554995207-c18c203602cb?w=500",
                    "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=500",
                    "https://images.unsplash.com/photo-1505691938895-1758d7feb511?w=500"
                ]
            }
        ];

        const saleProperties = [
            {
                id: "house_sale_201",
                title: "Sunset Penthouse",
                price: "K850,000",
                images: [
                    "https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=500",
                    "https://images.unsplash.com/photo-1539699013867-de394857e5b3?w=500",
                    "https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?w=500",
                    "https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=500"
                ]
            },
            {
                id: "house_sale_202",
                title: "Luxury Family Villa",
                price: "K2,100,000",
                images: [
                    "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=500",
                    "https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3?w=500",
                    "https://images.unsplash.com/photo-1600566752355-35792bedcfea?w=500",
                    "https://images.unsplash.com/photo-1512915922686-57c11dde9b6b?w=500"
                ]
            },
            {
                id: "house_sale_203",
                title: "Contemporary Minimalist Mansion",
                price: "K4,350,000",
                images: [
                    "https://images.unsplash.com/photo-1600585154526-990dced4db0d?w=500",
                    "https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?w=500",
                    "https://images.unsplash.com/photo-1600566753376-12c8ab7fb75b?w=500",
                    "https://images.unsplash.com/photo-1513694203232-719a280e022f?w=500"
                ]
            }
        ];

        // CAROUSEL GENERATOR & PROPERTY ENGINE
        function createCardHtml(property, buttonColor, buttonText) {
            const imageSlides = property.images.map(img => `
                <div class="swiper-slide">
                    <img src="${img}" alt="${property.title}" class="w-full h-full object-cover">
                </div>
            `).join('');

            return `
                <div class="bg-white rounded-lg shadow-md overflow-hidden border">
                    <div class="swiper card-swiper relative">
                        <div class="swiper-wrapper">
                            ${imageSlides}
                        </div>
                        <div class="swiper-button-next"></div>
                        <div class="swiper-button-prev"></div>
                        <div class="swiper-pagination"></div>
                    </div>
                    
                    <div class="p-4">
                        <h3 class="text-xl font-bold">${property.title}</h3>
                        <p class="text-gray-600 font-semibold">${property.price}</p>
                        <button onclick="processBooking('${property.id}')" class="mt-4 w-full ${buttonColor} text-white py-2 rounded-lg font-semibold transition hover:brightness-90">
                            ${buttonText}
                        </button>
                    </div>
                </div>
            `;
        }

        function renderAll() {
            const rentContainer = document.getElementById('rent-container');
            const saleContainer = document.getElementById('sale-container');

            rentContainer.innerHTML = rentProperties.map(p => createCardHtml(p, 'bg-blue-600', 'Rent / Secure Now')).join('');
            saleContainer.innerHTML = saleProperties.map(p => createCardHtml(p, 'bg-green-600', 'Place Holding Deposit')).join('');

            new Swiper(".card-swiper", {
                nested: true,
                pagination: { el: ".swiper-pagination", clickable: true },
                navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
                loop: true
            });
        }

        renderAll();

        async function processBooking(houseId) {
            try {
                const response = await fetch('http://localhost:5000/api/checkout/verify-and-pay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ houseId: houseId })
                });
                const data = await response.json();

                if (response.ok && data.url) {
                    window.location.href = data.url;
                } else {
                    alert(data.message || "Sorry, this house is no longer available.");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Could not reach checkout server. Make sure your local Node.js server is up.");
            }
        }
    </script>
</body>
</html>
